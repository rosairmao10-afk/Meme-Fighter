<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEME FIGHTER 2D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <div id="canvas-wrapper">
        <canvas id="game" width="1280" height="720"></canvas>
    </div>

    <!--
        PAINEL MOBILE — layout igual à imagem:

        ESQUERDA:
          [ESCUDO]   ← canto superior esquerdo
          [JOYSTICK] ← centro-baixo

        DIREITA:
          [ATQ PESADO] [ATQ LEVE]
          [ULTIMATE  ] [PULAR   ]
    -->
    <div id="mobile-controls">

        <div id="left-panel">
            <div id="btn-shield" class="mobile-btn btn-round">
                <span class="btn-icon">🛡</span>
                <span class="btn-label">ESCUDO</span>
            </div>
            <div id="joystick-zone">
                <div id="joystick-base"></div>
                <div id="joystick-knob"></div>
            </div>
        </div>

        <div id="right-panel">
            <!-- linha de cima -->
            <div id="btn-heavy" class="mobile-btn btn-round">
                <span class="btn-icon">💥</span>
                <span class="btn-label">ATQ<br>PESADO</span>
            </div>
            <div id="btn-attack" class="mobile-btn btn-round">
                <span class="btn-icon">⚡</span>
                <span class="btn-label">ATQ<br>LEVE</span>
            </div>
            <!-- linha de baixo -->
            <div id="btn-ult" class="mobile-btn btn-round">
                <span class="btn-icon">★</span>
                <span class="btn-label">ULTIMATE</span>
            </div>
            <div id="btn-jump" class="mobile-btn btn-rect">
                <span class="btn-icon btn-icon-small">↑</span>
                <span class="btn-label">PULAR</span>
            </div>
        </div>

    </div>

    <script src="src/constants.js"></script>
    <script src="src/controls.js"></script>
    <script src="src/collision.js"></script>
    <script src="src/effects.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/fighter.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
