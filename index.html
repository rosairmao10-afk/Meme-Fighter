<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEME FIGHTER 2D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <!-- Canvas com borda animada -->
    <div id="canvas-wrapper">
        <canvas id="game" width="1280" height="720"></canvas>
    </div>

    <!--
        PAINEL DE CONTROLES MOBILE
        Aparece ABAIXO do canvas quando está em luta.
        Celular em pé (portrait) — botões grandes estilo retrô.

        LAYOUT:
          Esquerda: Joystick + Pulo
          Direita:  ATQ LEVE | ATQ PESADO
                    ESCUDO   | ULTIMATE
    -->
    <div id="mobile-controls">

        <!-- Painel esquerdo -->
        <div id="left-panel">
            <div id="joystick-zone">
                <div id="joystick-base"></div>
                <div id="joystick-knob"></div>
            </div>
            <div id="btn-jump">
                <span class="btn-icon">↑</span>
                <span>PULAR</span>
            </div>
        </div>

        <!-- Painel direito: 2x2 -->
        <div id="right-panel">
            <!-- linha de cima -->
            <div id="btn-attack" class="mobile-btn">
                <span class="btn-icon">⚡</span>
                <span>ATQ<br>LEVE</span>
            </div>
            <div id="btn-heavy" class="mobile-btn">
                <span class="btn-icon">💥</span>
                <span>ATQ<br>PESADO</span>
            </div>
            <!-- linha de baixo -->
            <div id="btn-shield" class="mobile-btn">
                <span class="btn-icon">🛡</span>
                <span>ESCUDO</span>
            </div>
            <div id="btn-ult" class="mobile-btn">
                <span class="btn-icon">★</span>
                <span>ULTIMATE</span>
            </div>
        </div>

    </div>

    <script src="src/constants.js"></script>
    <script src="src/controls.js"></script>
    <script src="src/collision.js"></script>
    <script src="src/effects.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/fighter.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
